<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="代儲管理">
<meta name="theme-color" content="#0f1117">
<title>代儲管理</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f1117'/><text x='50' y='68' font-size='60' text-anchor='middle'>📦</text></svg>">
<link rel="stylesheet" href="style.css?v=9">
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Login -->
<div id="loginPage" class="page">
  <div class="login-box">
    <h1>📦 代儲管理系統</h1>
    <p class="sub">管理你的代儲商品、訂單與利潤</p>
    <div class="form-group">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input id="loginPw" type="password" placeholder="密碼">
    </div>
    <button id="btnLogin" class="btn primary full" onclick="doLogin()">登入</button>
    <button class="btn ghost full" onclick="doSignup()" style="margin-top:8px">註冊新帳號</button>
    <div class="form-group" style="margin-top:16px">
      <button class="btn ghost full" onclick="enterDemo()">先試用（本機模式）</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" class="page" style="display:none">

  <!-- Top Bar -->
  <header id="topBar">
    <div class="top-left">
      <span class="logo">📦</span>
      <span class="app-title">代儲管理</span>
    </div>
    <div class="top-right">
      <span id="userLabel" class="user-label"></span>
      <button class="icon-btn" onclick="doRefresh()" title="重新整理">⟳</button>
      <button class="icon-btn" onclick="toggleTheme()" title="切換主題">◐</button>
      <button class="icon-btn" onclick="openSettings()" title="設定">⚙</button>
      <button class="icon-btn" onclick="doLogout()" title="登出">⏻</button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav id="tabBar">
    <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">總覽</button>
    <button class="tab" data-tab="orders" onclick="switchTab('orders')">訂單</button>
    <button class="tab" data-tab="products" onclick="switchTab('products')">商品</button>
    <button class="tab" data-tab="agents" onclick="switchTab('agents')">出單人</button>
    <button class="tab" data-tab="customers" onclick="switchTab('customers')">客戶</button>
    <button class="tab" data-tab="ads" onclick="switchTab('ads')">廣告</button>
  </nav>

  <!-- Dashboard -->
  <section id="tab-dashboard" class="tab-content active">
    <div id="mpDash" class="month-picker-bar" data-target="dash"></div>
    <div class="stat-cards" id="statCards"></div>
    <div class="card">
      <div class="card-head"><h3>各平台利潤</h3></div>
      <div id="platformChart" class="chart-area"></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>管道比較</h3></div>
      <div id="channelStats" class="table-wrap"></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>近期訂單</h3></div>
      <div id="recentOrders" class="table-wrap"></div>
    </div>
  </section>

  <!-- Orders -->
  <section id="tab-orders" class="tab-content">
    <div class="toolbar">
      <button class="btn primary" onclick="openOrderModal()">＋ 新增訂單</button>
      <button class="btn accent" onclick="openOcrModal()">📷 截圖匯入</button>
      <div class="search-group">
        <input id="orderSearch" type="text" placeholder="搜尋訂單..." oninput="renderOrders()">
        <select id="orderChannelFilter" onchange="renderOrders()">
          <option value="">全部管道</option>
          <option value="8591">8591</option>
          <option value="個人">個人</option>
        </select>
        <select id="orderStatusFilter" onchange="renderOrders()">
          <option value="">全部狀態</option>
          <option value="處理中">處理中</option>
          <option value="已完成">已完成</option>
          <option value="已取消">已取消</option>
          <option value="已退款">已退款</option>
        </select>
      </div>
    </div>
    <div id="mpOrders" class="month-picker-bar" data-target="orders"></div>
    <div id="orderList" class="table-wrap"></div>
  </section>

  <!-- Products -->
  <section id="tab-products" class="tab-content">
    <div class="toolbar">
      <button class="btn primary" onclick="openProductModal()">＋ 新增商品</button>
      <input id="prodSearch" type="text" placeholder="搜尋商品..." oninput="renderProducts()">
    </div>
    <div id="productList"></div>
  </section>

  <!-- Agents -->
  <section id="tab-agents" class="tab-content">
    <div class="toolbar">
      <button class="btn primary" onclick="openAgentModal()">＋ 新增出單人</button>
    </div>
    <div id="agentList" class="table-wrap"></div>
  </section>

  <!-- Customers -->
  <section id="tab-customers" class="tab-content">
    <div class="toolbar">
      <button class="btn primary" onclick="openCustomerModal()">＋ 新增客戶</button>
      <input id="custSearch" type="text" placeholder="搜尋客戶..." oninput="renderCustomers()">
    </div>
    <div id="customerList" class="table-wrap"></div>
  </section>

  <!-- Ads -->
  <section id="tab-ads" class="tab-content">
    <div class="toolbar">
      <button class="btn primary" onclick="openAdModal()">＋ 新增廣告支出</button>
    </div>
    <div id="mpAds" class="month-picker-bar" data-target="ads"></div>
    <div class="stat-cards" id="adStatCards"></div>
    <div id="adList" class="table-wrap"></div>
  </section>

</div>

<!-- Modal backdrop -->
<div id="modalBg" class="modal-bg" onclick="closeModal()"></div>

<!-- Product Modal -->
<div id="productModal" class="modal">
  <div class="modal-head">
    <h3 id="prodModalTitle">新增商品</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input id="pm_id" type="hidden">
    <div class="form-row">
      <div class="form-group"><label>平台/商品</label><input id="pm_platform" list="platformList" placeholder="YouTube Premium"><datalist id="platformList"></datalist></div>
      <div class="form-group"><label>版本/類型</label><input id="pm_version" placeholder="家庭版"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>使用期間</label><input id="pm_duration" list="durationList" placeholder="1個月"><datalist id="durationList"><option value="1個月"><option value="3個月"><option value="6個月"><option value="12個月"></datalist></div>
      <div class="form-group"><label>狀態</label><select id="pm_status"><option>啟用</option><option>停用</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>成本 (NT$)</label><input id="pm_cost" type="number" min="0" placeholder="0"></div>
      <div class="form-group"><label>售價 (NT$)</label><input id="pm_price" type="number" min="0" placeholder="0"></div>
    </div>
    <div class="form-group"><label>提供資料</label><input id="pm_reqInfo" placeholder="電子信箱/密碼"></div>
    <div class="form-group"><label>備註</label><input id="pm_notes" placeholder=""></div>
    <div class="preview-box" id="prodPreview"></div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveProduct()">儲存</button>
  </div>
</div>

<!-- Order Modal -->
<div id="orderModal" class="modal modal-lg">
  <div class="modal-head">
    <h3 id="orderModalTitle">新增訂單</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input id="om_id" type="hidden">
    <div class="form-row">
      <div class="form-group"><label>日期</label><div id="om_date" class="dp-wrap"></div></div>
      <div class="form-group"><label>銷售管道</label><select id="om_channel" onchange="onChannelChange()"><option value="8591">8591</option><option value="個人">個人</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>出單人</label><select id="om_agent" onchange="calcOrderPreview()"></select></div>
      <div class="form-group"><label>客戶</label><select id="om_customer"><option value="">（無）</option></select></div>
    </div>
    <div class="form-group" id="om_productGroup">
      <label>選擇商品</label>
      <select id="om_product" onchange="onProductSelect()"><option value="">— 選擇商品 —</option></select>
    </div>
    <div id="om_manualGroup" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label>商品名稱</label>
          <select id="om_personalSelect" onchange="onPersonalSelect()"></select>
        </div>
        <div class="form-group" id="om_customNameGroup" style="display:none">
          <label>自訂名稱</label>
          <input id="om_manualName" placeholder="輸入商品名稱">
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>數量</label><input id="om_qty" type="number" min="1" value="1" oninput="calcOrderPreview()"></div>
      <div class="form-group"><label>售價/件</label><input id="om_unitPrice" type="number" min="0" oninput="calcOrderPreview()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>成本/件</label><input id="om_unitCost" type="number" min="0" oninput="calcOrderPreview()"></div>
      <div class="form-group"><label>狀態</label><select id="om_status"><option>處理中</option><option>已完成</option><option>已取消</option><option>已退款</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>到期日</label><div id="om_expiry" class="dp-wrap"></div></div>
      <div class="form-group"></div>
    </div>
    <div class="form-group"><label>備註</label><input id="om_notes" placeholder=""></div>
    <div class="preview-box" id="orderPreview"></div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveOrder()">儲存</button>
  </div>
</div>

<!-- Agent Modal -->
<div id="agentModal" class="modal modal-sm">
  <div class="modal-head">
    <h3 id="agentModalTitle">新增出單人</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input id="am_id" type="hidden">
    <div class="form-group"><label>名稱</label><input id="am_name" placeholder="出單人名稱"></div>
    <div class="form-row">
      <div class="form-group"><label>抽成方式</label><select id="am_commType"><option>百分比</option><option>固定金額</option></select></div>
      <div class="form-group"><label>抽成數值</label><input id="am_commVal" type="number" min="0" step="0.01" placeholder="0.2"></div>
    </div>
    <div class="form-group"><label>備註</label><input id="am_notes" placeholder=""></div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveAgent()">儲存</button>
  </div>
</div>

<!-- Customer Modal -->
<div id="customerModal" class="modal modal-sm">
  <div class="modal-head">
    <h3 id="custModalTitle">新增客戶</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input id="cm_id" type="hidden">
    <div class="form-group"><label>名稱</label><input id="cm_name" placeholder="客戶名稱"></div>
    <div class="form-group"><label>聯絡方式</label><input id="cm_contact" placeholder="Line ID / Discord"></div>
    <div class="form-group"><label>來源平台</label><input id="cm_platform" placeholder="蝦皮 / Dcard / 朋友介紹"></div>
    <div class="form-group"><label>備註</label><input id="cm_notes" placeholder=""></div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveCustomer()">儲存</button>
  </div>
</div>

<!-- Ad Modal -->
<div id="adModal" class="modal modal-sm">
  <div class="modal-head">
    <h3 id="adModalTitle">新增廣告支出</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input id="ad_id" type="hidden">
    <div class="form-row">
      <div class="form-group"><label>日期</label><div id="ad_date" class="dp-wrap"></div></div>
      <div class="form-group"><label>金額 (NT$)</label><input id="ad_amount" type="number" min="0" placeholder="0"></div>
    </div>
    <div class="form-group"><label>廣告平台</label><input id="ad_platform" list="adPlatformList" placeholder="8591 / Dcard / FB"><datalist id="adPlatformList"><option value="8591"><option value="Dcard"><option value="Facebook"><option value="Instagram"><option value="蝦皮"><option value="Google Ads"></datalist></div>
    <div class="form-group"><label>備註</label><input id="ad_notes" placeholder=""></div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveAd()">儲存</button>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirmModal" class="modal modal-sm">
  <div class="modal-head"><h3>確認</h3></div>
  <div class="modal-body"><p id="confirmMsg"></p></div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn danger" id="confirmBtn">確認</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal modal-sm">
  <div class="modal-head">
    <h3>設定</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>Anthropic API Key（截圖辨識用）</label>
      <input id="set_apiKey" type="password" placeholder="sk-ant-...">
      <p class="hint">到 <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> 取得，儲存在本機</p>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn primary" onclick="saveSettings()">儲存</button>
  </div>
</div>

<!-- OCR Import Modal -->
<div id="ocrModal" class="modal modal-lg">
  <div class="modal-head">
    <h3>📷 截圖匯入訂單</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <div id="ocrUploadArea" class="ocr-upload">
      <div class="ocr-placeholder" id="ocrPlaceholder">
        <div class="icon">📷</div>
        <p>點擊上傳截圖，或拖拽圖片到此處</p>
        <p class="sub">支援 8591 訂單頁面截圖，可包含多筆訂單</p>
        <input type="file" id="ocrFile" accept="image/*" style="display:none" onchange="onOcrFileSelect(event)">
      </div>
      <img id="ocrPreviewImg" class="ocr-preview-img" style="display:none">
    </div>
    <div id="ocrStatus" style="display:none" class="ocr-status">
      <div class="spinner"></div>
      <span>AI 辨識中，請稍候...</span>
    </div>
    <div id="ocrResults" style="display:none">
      <h4 style="margin-bottom:8px">辨識結果（確認後匯入）</h4>
      <div id="ocrOrderList"></div>
      <div class="ocr-summary" id="ocrSummary"></div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" onclick="closeModal()">取消</button>
    <button class="btn ghost" id="btnOcrRetry" style="display:none" onclick="resetOcr()">重新上傳</button>
    <button class="btn primary" id="btnOcrImport" style="display:none" onclick="importOcrOrders()">匯入全部</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js?v=9"></script>
</body>
</html>
